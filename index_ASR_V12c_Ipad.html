<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agustina - Asistente Virtual</title>

    <!-- Configuración PWA para iPad/iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agustina">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712010.png">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }
        
        #chat-container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            background-color: #1e1e1e;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        h1 { color: #f55036; margin-bottom: 5px; font-size: 1.8rem; }
        #statusText { margin: 20px 0; font-size: 1.1rem; color: #aaaaaa; min-height: 80px; line-height: 1.5; }
        .controles { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        button {
            padding: 15px 25px; font-size: 1rem; font-weight: bold; color: white;
            border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #btnListen { background-color: #f55036; box-shadow: 0 4px 12px rgba(245, 80, 54, 0.3); flex: 2; }
        #btnListen.listening { background-color: #28a745; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4); animation: pulse 2s infinite; }
        #btnStop { background-color: #444; flex: 1; }
        #btnStop:active { background-color: #666; transform: scale(0.95); }
        select {
            margin-top: 8px; padding: 12px; border-radius: 12px; background-color: #2d2d2d;
            color: white; border: 1px solid #444; font-size: 0.9rem; width: 100%; appearance: none;
        }

        .btn-youtube {
            display: inline-block; margin-top: 15px; padding: 20px 40px;
            background-color: #ff0000; color: white; font-size: 1.2rem; font-weight: bold;
            text-decoration: none; border-radius: 50px; box-shadow: 0 5px 15px rgba(255,0,0,0.4);
            animation: pulse 1.5s infinite;
        }

        /* --- DISEÑO OPTIMIZADO PARA IPAD / TABLETS --- */
        @media (min-width: 768px) {
            #chat-container { max-width: 700px; padding: 40px; border-radius: 30px; }
            h1 { font-size: 2.8rem; } 
            p { font-size: 1.1rem; }
            #statusText { font-size: 1.5rem; min-height: 120px; } 
            button { padding: 20px 30px; font-size: 1.3rem; } 
            select { padding: 18px; font-size: 1.1rem; }
            .btn-youtube { font-size: 1.5rem; padding: 25px 50px; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <h1>Agustina</h1>
        <p style="color: #888;">I.E. San Agustín</p>
        
        <p id="statusText">Presiona el botón para hablar.</p>
        
        <div class="controles">
            <button id="btnListen">Hablar con Agustina</button>
            <button id="btnStop">Parar 🛑</button>
        </div>

        <div class="config-voz" style="margin-top: 10px; color: #888;">
            <label for="voiceSelect">Voz de Agustina:</label>
            <select id="voiceSelect">
                <option>Cargando voces...</option>
            </select>
        </div>
        
        <!-- Instrucciones actualizadas -->
        <p style="margin-top: 20px; font-size: 0.9rem; color: #555;">Toca el botón y pide: "Reproduce [canción]" o haz una pregunta.</p>
    </div>

    <script>
        // --- 1. CLAVES ---
        let API_KEY = localStorage.getItem('groqApiKey');
        let YT_API_KEY = localStorage.getItem('ytApiKey');

        if (!API_KEY) {
            API_KEY = prompt("1/2 - Pega tu clave de GROQ:");
            if (API_KEY) localStorage.setItem('groqApiKey', API_KEY);
        }
        if (!YT_API_KEY) {
            YT_API_KEY = prompt("2/2 - Pega tu clave de la API DE YOUTUBE:");
            if (YT_API_KEY) localStorage.setItem('ytApiKey', YT_API_KEY);
        }

        const btnListen = document.getElementById('btnListen');
        const btnStop = document.getElementById('btnStop');
        const statusText = document.getElementById('statusText');
        const voiceSelect = document.getElementById('voiceSelect');
        
        let vocesDisponibles = [];
        let asistenteHablando = false;
        let sistemaActivo = false;
        let procesandoComando = false; 

        // --- 2. MOTOR DE VOZ ---
        function cargarVoces() {
            vocesDisponibles = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            const vocesEspañol = vocesDisponibles.filter(v => v.lang.includes('es'));
            let indiceDefecto = 0; let nivelPrioridad = 0;
            vocesEspañol.forEach((voz, i) => {
                const opt = document.createElement('option');
                opt.textContent = `${voz.name} (${voz.lang})`;
                opt.value = vocesDisponibles.indexOf(voz);
                voiceSelect.appendChild(opt);
                const nombre = voz.name.toLowerCase();
                const lang = voz.lang.toLowerCase();
                if (lang.includes('co') && nivelPrioridad < 3) { indiceDefecto = i; nivelPrioridad = 3; } 
                else if ((nombre.includes('female') || nombre.includes('mujer') || nombre.includes('sabina') || nombre.includes('helena')) && nivelPrioridad < 2) { indiceDefecto = i; nivelPrioridad = 2; }
            });
            if (vocesEspañol.length > 0) voiceSelect.selectedIndex = indiceDefecto;
        }
        if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = cargarVoces; }

        // --- 3. RECONOCIMIENTO (Modo Walkie-Talkie) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) statusText.textContent = "Tu navegador no soporta voz. Usa Safari o Chrome.";
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'es-CO';
        recognition.continuous = false; // Se apaga al primer silencio
        recognition.interimResults = false;

        recognition.onstart = () => {
            sistemaActivo = true;
            btnListen.textContent = "Escuchando...";
            btnListen.classList.add("listening");
            statusText.textContent = "Habla ahora...";
        };

        // BÚSQUEDA YOUTUBE
        async function reproducirMusica(comandoText) {
            let busqueda = comandoText.replace("reproduce", "").replace("pon música", "").replace("pon musica", "").replace("de", "").trim();
            
            sistemaActivo = false;
            
            btnListen.textContent = "Hablar con Agustina";
            btnListen.classList.remove("listening");
            statusText.textContent = `Buscando "${busqueda}"...`;

            if (!YT_API_KEY) {
                statusText.textContent = "Error: Falta la clave de YouTube.";
                return;
            }

            try {
                const urlYT = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(busqueda)}&type=video&key=${YT_API_KEY}`;
                const respuesta = await fetch(urlYT);
                const datos = await respuesta.json();

                if (datos.error) {
                    statusText.innerHTML = `<span style="color: #f55036;">Error API: ${datos.error.message}</span><br><br><button onclick="localStorage.removeItem('ytApiKey'); location.reload();">Cambiar Clave YouTube</button>`;
                    hablar("Lo siento, hay un error con la clave de YouTube.");
                    return;
                }

                if (datos.items && datos.items.length > 0) {
                    const videoId = datos.items[0].id.videoId;
                    const titulo = datos.items[0].snippet.title;
                    const urlVideo = `https://www.youtube.com/watch?v=${videoId}`;
                    
                    hablar(`Enseguida. Reproduciendo ${titulo}`);
                    
                    let ventanaAbrir = window.open(urlVideo, '_blank');
                    
                    if (!ventanaAbrir) {
                        statusText.innerHTML = `
                            Reproduciendo:<br><b>${titulo}</b><br><br>
                            <a href="${urlVideo}" target="_blank" class="btn-youtube">▶️ Toca aquí para abrir YouTube</a>
                        `;
                    } else {
                        statusText.innerHTML = `Reproduciendo en YouTube:<br><b>${titulo}</b>`;
                    }
                    
                } else {
                    hablar("Lo siento, no encontré esa canción.");
                    statusText.textContent = "No encontré esa canción.";
                }
            } catch (error) {
                statusText.textContent = "Error de conexión de red con YouTube.";
            }
        }

        recognition.onresult = (event) => {
            if (!sistemaActivo) return;
            let transcript = event.results[event.resultIndex][0].transcript.toLowerCase();

            procesandoComando = true;
            recognition.stop(); 

            // Limpiamos la frase por si el usuario dice "Hola Agustina" por costumbre
            transcript = transcript.replace("hola agustina", "").trim();

            if (transcript.length > 2) {
                if (transcript.startsWith("reproduce") || transcript.startsWith("pon música") || transcript.startsWith("pon musica")) {
                    reproducirMusica(transcript);
                } else {
                    procesarIA(transcript);
                }
            } else {
                hablar("No te entendí bien. Presiona el botón y vuelve a intentarlo.");
            }
        };

        // EVENTO CLAVE: Si el micrófono se apaga, actualizamos la interfaz pero NO lo reiniciamos
        recognition.onend = () => { 
            if (!procesandoComando && !asistenteHablando) { 
                sistemaActivo = false;
                btnListen.textContent = "Hablar con Agustina";
                btnListen.classList.remove("listening");
                statusText.textContent = "Presiona el botón para hablar.";
            } 
        };

        // --- 4. CEREBRO ULTRA RÁPIDO ---
        async function procesarIA(texto) {
            statusText.innerHTML = `Tú: "${texto}"<br><em>Pensando... ⚡</em>`;
            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", 
                        messages: [
                            { role: "system", content: "Eres Agustina, asistente de la I.E. San Agustín. Eres amable, colombiana y experta en conocimientos generales. Responde de forma muy breve y concisa, máximo 2 oraciones. Es para ser leída en voz alta." },
                            { role: "user", content: texto }
                        ],
                        max_tokens: 100 
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error();
                const respuesta = data.choices[0].message.content;
                statusText.innerHTML = `Tú: "${texto}"<br><span style="color: #f55036;">Agustina: "${respuesta}"</span>`;
                hablar(respuesta); 
            } catch (e) {
                statusText.innerHTML = `Error. <button onclick="localStorage.clear(); location.reload();" style="font-size: 1rem; padding: 10px;">Borrar Claves y Reiniciar</button>`;
            }
        }

        // --- 5. SÍNTESIS DE VOZ ---
        function hablar(t) {
            window.speechSynthesis.cancel();
            asistenteHablando = true;
            procesandoComando = false; 
            recognition.stop(); // Nos aseguramos de que el micrófono esté cerrado

            const u = new SpeechSynthesisUtterance(t);
            const v = vocesDisponibles[voiceSelect.value];
            if (v) u.voice = v;
            u.lang = 'es-CO';
            u.rate = 1.0;
            
            // Cuando Agustina termina de hablar, el sistema se pone en reposo total
            u.onend = () => {
                asistenteHablando = false;
                sistemaActivo = false;
                statusText.textContent = "Presiona el botón para hablar.";
                btnListen.textContent = "Hablar con Agustina";
                btnListen.classList.remove("listening");
            };
            window.speechSynthesis.speak(u);
        }

        // --- BOTONES ---
        btnListen.addEventListener('click', () => {
            cargarVoces();
            let audioDesbloqueo = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(audioDesbloqueo);
            try { recognition.start(); } catch(e) {}
        });
        btnStop.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            sistemaActivo = false; asistenteHablando = false; procesandoComando = false; recognition.stop();
            btnListen.textContent = "Hablar con Agustina"; btnListen.classList.remove("listening");
            statusText.textContent = "Sistema detenido.";
        });
    </script>
</body>
</html>
